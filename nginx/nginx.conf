# FarolStream — proxy reverso na frente do gateway SSE e do dashboard.
#
# É AQUI que a maioria das implementações de SSE quebra em produção:
# defaults de proxy (buffering ligado, read timeout de 60s) transformam um
# stream infinito em respostas picotadas ou conexões derrubadas a cada minuto.
# As diretivas críticas estão no bloco `location /api/events`.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # O token do handshake SSE viaja na query string (EventSource não aceita
    # headers). $uri NÃO inclui a query string — este log_format garante que
    # tokens nunca aparecem no access log (ver SECURITY.md).
    log_format sse_safe '$remote_addr - [$time_local] "$request_method $uri" '
                        '$status $body_bytes_sent "$http_user_agent"';
    access_log /dev/stdout sse_safe;

    upstream api {
        server api:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;

        # ------------------------------------------------------------------
        # SSE — as quatro diretivas que fazem streams sobreviverem a proxies
        # ------------------------------------------------------------------
        location /api/events {
            proxy_pass http://api/events;

            # 1. Sem buffering: cada evento é entregue ao navegador na hora,
            #    não quando o buffer do proxy encher.
            proxy_buffering off;
            proxy_cache off;

            # 2. Timeout de leitura MUITO maior que o intervalo do heartbeat
            #    (20s). Com o default de 60s, qualquer pausa nos eventos
            #    derrubaria a conexão.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # 3. HTTP/1.1 com conexão persistente — SSE é uma resposta
            #    infinita, não pode haver "Connection: close" no meio.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # 4. Headers de contexto padrão.
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Demais rotas da API (ex.: /api/auth/sse-token, /api/healthz)
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Dashboard Next.js
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

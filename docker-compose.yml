services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Gateway SSE — 1 conexão Redis, N streams em memória
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Produtor 1: observabilidade (event: log, event: alert)
  publisher-ops:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m src.publisher.main
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      PUBLISHER_ROLE: ops
    depends_on:
      redis:
        condition: service_healthy

  # Produtor 2: mercado (event: trade) — mesma imagem, papel diferente.
  # Dois produtores independentes no mesmo canal é o que o Pub/Sub orquestra.
  publisher-market:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m src.publisher.main
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      PUBLISHER_ROLE: market
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: src/frontend
      dockerfile: Dockerfile
    expose:
      - "3000"

  # Única porta pública do sistema — tudo passa pelo proxy (ver nginx/nginx.conf)
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
